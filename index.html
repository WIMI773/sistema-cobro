<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sistema de Cobro Compacto</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header>
    <div class="header-content">
      <div>
        <h1>Sistema de Cobro</h1>
        <p>Selecciona un cliente y administra su perfil, pr�stamos, cuotas y pagos desde un �nico panel.</p>
      </div>
    </div>
  </header>

  <main class="dashboard">
    <aside class="panel panel-left">
      <div class="card card-small">
        <h2>Buscar cliente</h2>
        <input type="text" id="buscarCliente" placeholder="Buscar por nombre o cédula" oninput="buscarClientes()" />
      </div>

      <div id="nuevoClienteCard" class="card card-small hidden">
        <h2>Nuevo cliente</h2>
        <input type="text" id="nombre" placeholder="Nombre" />
        <input type="text" id="cedula" placeholder="Cédula" />
        <input type="text" id="telefono" placeholder="Teléfono" />
        <input type="text" id="direccion" placeholder="Dirección" />
        <input type="text" id="foto" placeholder="URL de foto de perfil (opcional)" />
        <button onclick="guardarCliente()">Guardar cliente</button>
        <button type="button" class="btn-secondary" onclick="ocultarNuevoCliente()">Cancelar</button>
      </div>

      <div class="card">
        <h2>Clientes</h2>
        <div class="table-container">
          <table>
            <thead>
              <tr>
                <th>Nombre</th>
                <th>Cédula</th>
                <th>Teléfono</th>
                <th>Acción</th>
              </tr>
            </thead>
            <tbody id="tablaClientes"></tbody>
          </table>
        </div>
      </div>
    </aside>
  </main>

  <button class="fab" onclick="toggleNuevoCliente()" aria-label="Crear cliente">+</button>

  <script src="app.js"></script>
</body>
</html>
