<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#2563eb" />
  <title>Detalle Cliente</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="logocobro.png" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header>
    <div class="header-content">
      <div>
        <h1>Detalle del cliente</h1>
      </div>
      <div class="header-actions">
        <span id="usuarioEmail"></span>
        <button id="logoutButton" class="btn-secondary small">Cerrar sesión</button>
      </div>
    </div>
  </header>

  <main class="dashboard">
    <section class="panel panel-right">
      <div class="card">
        <a href="index.html" class="btn-secondary small" style="margin-bottom:16px; display:inline-block;">←</a>
        <div id="detalleContainer"></div>
      </div>
    </section>
  </main>

  <!-- Modal pago -->
  <div id="modalPago" class="modal-overlay hidden" aria-hidden="true" onclick="if (event.target === this) cerrarModalPago()">
    <div class="modal-window" role="dialog" aria-modal="true" aria-labelledby="modalPagoTitle">
      <h2 id="modalPagoTitle" class="modal-title">Pagar cuota</h2>
      <p id="modalPagoTexto" class="modal-content">Selecciona la fecha de pago manualmente.</p>
      <div class="modal-field">
        <label for="modalPagoFecha">Fecha de pago</label>
        <input id="modalPagoFecha" type="date" />
      </div>
      <div class="modal-field">
        <label for="modalPagoMonto">Monto a pagar</label>
        <input id="modalPagoMonto" type="text" inputmode="numeric" placeholder="Ej: 12.000" />
        <small style="color:#6b7280; font-size:0.75rem;">Puedes modificar el monto si el cliente paga un valor diferente.</small>
      </div>
      <div class="modal-actions">
        <button type="button" class="btn-secondary small" onclick="cerrarModalPago()">Cancelar</button>
        <button type="button" onclick="confirmarPagoCuota()">Confirmar pago</button>
      </div>
    </div>
  </div>

  <!-- Modal editar cliente -->
  <div id="modalEditarCliente" class="modal-overlay hidden" aria-hidden="true" onclick="if (event.target === this) cerrarModalEditar()">
    <div class="modal-window" role="dialog" aria-modal="true" aria-labelledby="modalEditarTitle">
      <h2 id="modalEditarTitle" class="modal-title">Editar cliente</h2>
      <div class="modal-field">
        <label for="editNombre">Nombre</label>
        <input id="editNombre" type="text" placeholder="Nombre completo" />
      </div>
      <div class="modal-field">
        <label for="editCedula">Cédula</label>
        <input id="editCedula" type="text" placeholder="Número de cédula" />
      </div>
      <div class="modal-field">
        <label for="editTelefono">Teléfono</label>
        <input id="editTelefono" type="tel" placeholder="Ej: 3001234567" />
      </div>
      <div class="modal-field">
        <label for="editDireccion">Dirección</label>
        <input id="editDireccion" type="text" placeholder="Dirección" />
      </div>
      <div class="modal-field">
        <label for="editFoto">URL foto (opcional)</label>
        <input id="editFoto" type="url" placeholder="https://..." />
      </div>
      <div class="modal-actions">
        <button type="button" class="btn-secondary small" onclick="cerrarModalEditar()">Cancelar</button>
        <button type="button" onclick="guardarEdicionCliente()">Guardar cambios</button>
      </div>
    </div>
  </div>

  <div id="toast" class="toast hidden"></div>
  <button id="btnNuevoPrestamoFab" class="fab" type="button" onclick="abrirTabPrestamo()" aria-label="Nuevo préstamo">+</button>

  <!-- Modal editar préstamo -->
  <div id="modalEditarPrestamo" class="modal-overlay hidden" aria-hidden="true" onclick="if (event.target === this) cerrarModalEditarPrestamo()">
    <div class="modal-window" role="dialog" aria-modal="true" aria-labelledby="modalEditarPrestamoTitle">
      <h2 id="modalEditarPrestamoTitle" class="modal-title">Editar préstamo</h2>
      <div class="modal-field">
        <label for="editPrestamoMonto">Monto</label>
        <input id="editPrestamoMonto" type="text" inputmode="numeric" />
      </div>
      <div class="modal-field">
        <label for="editPrestamoInteres">Interés (%)</label>
        <input id="editPrestamoInteres" type="number" />
      </div>
      <div class="modal-field">
        <label for="editPrestamoCuotas">Número de cuotas</label>
        <input id="editPrestamoCuotas" type="number" />
      </div>
      <div class="modal-field">
        <label for="editPrestamoValorCuota">Valor cuota (opcional)</label>
        <input id="editPrestamoValorCuota" type="text" inputmode="numeric" />
      </div>
      <div class="modal-field">
        <label for="editPrestamoFecha">Fecha del préstamo</label>
        <input id="editPrestamoFecha" type="date" />
      </div>
      <div class="modal-field">
        <label for="editPrestamoFrecuencia">Frecuencia</label>
        <select id="editPrestamoFrecuencia">
          <option value="diario">Diario</option>
          <option value="semanal">Semanal</option>
          <option value="quincenal">Quincenal</option>
          <option value="mensual">Mensual</option>
          <option value="manual">Manual</option>
        </select>
      </div>
      <div class="modal-field">
        <label><input id="editPrestamoRegenerar" type="checkbox" /> Regenerar cuotas (se perderán pagos registrados)</label>
      </div>
      <div class="modal-actions">
        <button type="button" class="btn-secondary small" onclick="cerrarModalEditarPrestamo()">Cancelar</button>
        <button type="button" onclick="guardarEdicionPrestamo()">Guardar cambios</button>
      </div>
    </div>
  </div>

  <script type="module" src="detalle.js"></script>
</body>
</html>
