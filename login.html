<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#2563eb" />
  <title>Login - Sistema de Cobro</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="logocobro.png" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="login-page">
    <div class="login-card">
      <div class="brand-strip">
        <div class="brand-mark">
          <img class="brand-logo" src="logocobro.png" alt="Logo Cobro Diario" onerror="this.style.display='none'" />
        </div>
        <div>
          <p class="brand-label">CrediApp</p>
        </div>
      </div>

      <div class="tabs">
        <button id="loginTab" type="button" class="tab-button active">Iniciar sesión</button>
        <button id="registerTab" type="button" class="tab-button">Crear cuenta</button>
      </div>

      <h1 id="formTitle">Bienvenido de nuevo</h1>
      <p id="formSubtitle" class="form-subtitle">Inicia sesión para administrar clientes, préstamos y pagos desde cualquier dispositivo.</p>

      <div class="form-group">
        <label for="email">Correo electrónico</label>
        <input id="email" type="email" placeholder="tucorreo@ejemplo.com" autocomplete="username" />
      </div>

      <div class="form-group input-group">
        <label for="password">Contraseña</label>
        <input id="password" type="password" placeholder="Tu contraseña" autocomplete="current-password" />
        <button id="togglePassword" type="button" class="password-toggle"></button>
      </div>

      <button id="actionBtn" type="button">Iniciar sesión</button>
      <p id="authMessage" class="auth-message"></p>
    </div>
  </main>

  <script type="module">
    import { loginWithEmail, registerWithEmail, onAuthChange } from './firebase.js';

    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');
    const togglePassword = document.getElementById('togglePassword');
    const authMessage = document.getElementById('authMessage');
    const actionBtn = document.getElementById('actionBtn');
    const loginTab = document.getElementById('loginTab');
    const registerTab = document.getElementById('registerTab');
    const formTitle = document.getElementById('formTitle');
    const formSubtitle = document.getElementById('formSubtitle');

    let mode = 'login';

    function mostrarMensaje(texto, tipo = 'error') {
      authMessage.textContent = texto;
      authMessage.className = `auth-message ${tipo}`;
    }

    function validarFormulario() {
      const email = emailInput.value.trim();
      const password = passwordInput.value.trim();

      if (!email || !password) {
        mostrarMensaje('Ingresa correo y contraseña.', 'error');
        return false;
      }

      const emailValido = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
      if (!emailValido) {
        mostrarMensaje('Ingresa un correo válido.', 'error');
        return false;
      }

      if (password.length < 6) {
        mostrarMensaje('La contraseña debe tener al menos 6 caracteres.', 'error');
        return false;
      }

      return true;
    }

    function togglePasswordVisibility() {
      if (passwordInput.type === 'password') {
        passwordInput.type = 'text';
        togglePassword.textContent = '🙈';
      } else {
        passwordInput.type = 'password';
        togglePassword.textContent = '👁️';
      }
    }

    async function iniciarSesion() {
      if (!validarFormulario()) return;

      try {
        authMessage.textContent = '';
        actionBtn.disabled = true;
        actionBtn.textContent = 'Ingresando...';
        await loginWithEmail(emailInput.value.trim(), passwordInput.value.trim());
      } catch (error) {
        mostrarMensaje(`${error.code || 'ERROR'}: ${error.message || 'No se pudo iniciar sesión.'}`);
        console.error('Login error:', error);
      } finally {
        actionBtn.disabled = false;
        actionBtn.textContent = mode === 'login' ? 'Iniciar sesión' : 'Crear cuenta';
      }
    }

    async function crearCuenta() {
      if (!validarFormulario()) return;

      try {
        authMessage.textContent = '';
        actionBtn.disabled = true;
        actionBtn.textContent = 'Creando cuenta...';
        await registerWithEmail(emailInput.value.trim(), passwordInput.value.trim());
        mostrarMensaje('Cuenta creada correctamente. Redirigiendo...', 'success');
      } catch (error) {
        mostrarMensaje(`${error.code || 'ERROR'}: ${error.message || 'No se pudo crear la cuenta.'}`);
        console.error('Register error:', error);
      } finally {
        actionBtn.disabled = false;
        actionBtn.textContent = mode === 'login' ? 'Iniciar sesión' : 'Crear cuenta';
      }
    }

    function actualizarModo(nuevoModo) {
      mode = nuevoModo;
      loginTab.classList.toggle('active', mode === 'login');
      registerTab.classList.toggle('active', mode === 'register');
      actionBtn.textContent = mode === 'login' ? 'Iniciar sesión' : 'Crear cuenta';
      formTitle.textContent = mode === 'login' ? 'Bienvenido de nuevo' : 'Crea una cuenta nueva';
      formSubtitle.textContent = mode === 'login'
        ? 'Inicia sesión para administrar clientes, préstamos y pagos desde cualquier dispositivo.'
        : 'Registra un correo y contraseña para comenzar a usar el sistema desde cualquier dispositivo.';
      mostrarMensaje('');
    }

    actionBtn.addEventListener('click', () => {
      if (mode === 'login') {
        iniciarSesion();
      } else {
        crearCuenta();
      }
    });

    loginTab.addEventListener('click', () => actualizarModo('login'));
    registerTab.addEventListener('click', () => actualizarModo('register'));
    togglePassword.addEventListener('click', togglePasswordVisibility);

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(error => {
        console.warn('Service worker registration failed:', error);
      });
      window.addEventListener('beforeinstallprompt', event => {
        event.preventDefault();
        window.deferredInstallPrompt = event;
      });
    }

    onAuthChange(user => {
      if (user) {
        window.location.href = 'index.html';
      }
    });
  </script>
</body>
</html>
